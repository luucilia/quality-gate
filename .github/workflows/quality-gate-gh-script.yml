name: Quality Gate (GitHub Script)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Quality Gate via GitHub Script
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const dataExecucao = new Date().toISOString().split('T')[0];
            const org = context.repo.owner;

            const resultsDir = `results/${dataExecucao}`;
            fs.mkdirSync(resultsDir, { recursive: true });

            const csvPath = `${resultsDir}/inventory.csv`;

            // Cabeçalho CSV
            let csv = "org,repo,linguagem,versao_atual,baseline_min,baseline_target,status,data_execucao\n";

            // Baselines
            const baselines = JSON.parse(fs.readFileSync('baselines/baseline.json', 'utf-8'));

            const baselineJavaMin = baselines.java.min;
            const baselineJavaTarget = baselines.java.target;

            const baselineDotnetMin = baselines.dotnet.min;
            const baselineDotnetTarget = baselines.dotnet.target;

            // Buscar repos
            const repos = await github.paginate(
              github.rest.repos.listForAuthenticatedUser,
              { per_page: 100 }
            );

            for (const repo of repos) {
              const repoName = repo.name;
              console.log(`Processando ${repoName}`);

              if (repoName === "quality-gate") {
                csv += `${org},${repoName},DESCONHECIDO,N/A,N/A,N/A,N/A,${dataExecucao}\n`;
                continue;
              }

              let language = "DESCONHECIDO";
              let version = "N/A";
              let baselineMin = "N/A";
              let baselineTarget = "N/A";
              let result = "N/A";

              let techDetected = false;

              const defaultBranch = repo.default_branch;

              // Tree recursiva
              const tree = await github.rest.git.getTree({
                owner: org,
                repo: repoName,
                tree_sha: defaultBranch,
                recursive: "1"
              });

              const paths = tree.data.tree.map(t => t.path);

              // -------------------
              // JAVA
              // -------------------
              const pomPath = paths.find(p => p.endsWith('pom.xml'));

              if (pomPath && !techDetected) {
                techDetected = true;
                language = "Java";
                baselineMin = baselineJavaMin;
                baselineTarget = baselineJavaTarget;

                const file = await github.rest.repos.getContent({
                  owner: org,
                  repo: repoName,
                  path: pomPath,
                  ref: defaultBranch
                });

                const content = Buffer.from(file.data.content, 'base64').toString();

                const extract = (regex) => {
                  const match = content.match(regex);
                  return match ? match[1] : null;
                };

                version =
                  extract(/<java.version>(.*?)</) ||
                  extract(/<maven.compiler.release>(.*?)</) ||
                  extract(/<maven.compiler.source>(.*?)</) ||
                  extract(/<maven.compiler.target>(.*?)</) ||
                  extract(/<source>(.*?)</) ||
                  extract(/<target>(.*?)</) ||
                  "NAO_DECLARADA";

                version = version.replace(/^1\./, '');

                if (version === "NAO_DECLARADA") {
                  result = "ABAIXO";
                } else if (version < baselineMin) {
                  result = "ABAIXO_MINIMO";
                } else if (version < baselineTarget) {
                  result = "ABAIXO_TARGET";
                } else {
                  result = "OK";
                }
              }

              // -------------------
              // JAVA LEGACY
              // -------------------
              if (!techDetected && paths.some(p => p.endsWith('.java'))) {
                techDetected = true;
                language = "Java-LEGACY";
                baselineMin = baselineJavaMin;
                baselineTarget = baselineJavaTarget;
                result = "ABAIXO";
              }

              // -------------------
              // DOTNET
              // -------------------
              const csproj = paths.find(p => p.endsWith('.csproj'));

              if (csproj && !techDetected) {
                techDetected = true;
                language = ".NET";
                baselineMin = baselineDotnetMin;
                baselineTarget = baselineDotnetTarget;

                const file = await github.rest.repos.getContent({
                  owner: org,
                  repo: repoName,
                  path: csproj,
                  ref: defaultBranch
                });

                const content = Buffer.from(file.data.content, 'base64').toString();

                const match = content.match(/<TargetFramework>net(.*?)</);
                version = match ? match[1].replace('.0','') : "NAO_DECLARADA";

                if (version === "NAO_DECLARADA") {
                  result = "ABAIXO";
                } else if (version < baselineMin) {
                  result = "ABAIXO_MINIMO";
                } else if (version < baselineTarget) {
                  result = "ABAIXO_TARGET";
                } else {
                  result = "OK";
                }
              }

              csv += `${org},${repoName},${language},${version},${baselineMin},${baselineTarget},${result},${dataExecucao}\n`;
            }

            fs.writeFileSync(csvPath, csv);

      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: inventory-${{ github.run_id }}
          path: results/**/inventory.csv

      - name: Commitar resultados
        run: |
          git config user.name "quality-gate-bot"
          git config user.email "quality-gate@github.com"

          git add results/
          git commit -m "Quality Gate results - $(date -u +'%Y-%m-%d')" || echo "Nada para commitar"

          git pull --rebase origin master
          git push
